<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Bookings</title>

    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary">
            <i class="bi bi-ticket-perforated"></i> My Bookings
        </h2>
        <a href="/events" class="btn btn-outline-primary">
            <i class="bi bi-arrow-left"></i> Back to Events
        </a>
    </div>

    <!-- Table Card -->
    <div class="card shadow">
        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">
                        <tr>
                            <th>Event</th>
                            <th>Tickets</th>
                            <th>Total Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="b : ${bookings}">
                            <td class="fw-semibold" th:text="${b.event.title}"></td>

                            <td>
                                <span class="badge bg-info text-dark"
                                      th:text="${b.numberOfTickets}"></span>
                            </td>

                            <td class="text-success fw-bold">
                                ₹<span th:text="${b.totalAmount}"></span>
                            </td>

                            <td>
                                <span class="badge bg-success"
                                      th:if="${b.status == 'CONFIRMED'}">
                                    CONFIRMED
                                </span>

                                <span class="badge bg-warning text-dark"
                                      th:if="${b.status != 'CONFIRMED'}"
                                      th:text="${b.status}">
                                </span>
                            </td>
                        </tr>
                    </tbody>

                </table>

            </div>

            <!-- Empty State -->
            <div class="text-center mt-4" th:if="${#lists.isEmpty(bookings)}">
                <h5 class="text-muted">No bookings found</h5>
                <a href="/events" class="btn btn-primary mt-2">Book Now</a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
