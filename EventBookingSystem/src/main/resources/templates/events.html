<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Events</title>

    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- ✅ JavaScript -->
    <script>
        function validateTickets(input, availableSeats) {
            let tickets = input.value;

            if (tickets <= 0) {
                alert("Tickets must be greater than 0");
                input.value = "";
            }

            if (tickets > availableSeats) {
                alert("Only " + availableSeats + " seats available");
                input.value = "";
            }
        }
    </script>
</head>

<body class="bg-light">

<!-- 🔹 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Event Booking</a>

        <div>
            <a href="/events" class="btn btn-outline-light me-2">Events</a>
            <a href="/my-bookings?userId=1" class="btn btn-outline-light me-2">My Bookings</a>
            <a href="/dashboard" class="btn btn-warning">Dashboard</a>
        </div>
    </div>
</nav>

<!-- 🔹 CONTENT -->
<div class="container mt-5">

    <h2 class="text-center mb-4 fw-bold">Explore Events</h2>

    <div class="row g-4">

        <!-- 🔁 Loop Events -->
        <div class="col-lg-4 col-md-6" th:each="event : ${events}">
            
            <div class="card shadow-lg border-0 h-100 rounded-4">
                
                <div class="card-body d-flex flex-column">

                    <h5 class="card-title fw-bold text-primary" th:text="${event.title}"></h5>

                    <p class="mb-1">
                        <i class="bi bi-geo-alt-fill text-danger"></i>
                        <span th:text="${event.location}"></span>
                    </p>

                    <p class="mb-1">
                        <i class="bi bi-calendar-event text-success"></i>
                        <span th:text="${event.date}"></span>
                    </p>

                    <p class="mb-1">
                        <i class="bi bi-people-fill text-info"></i>
                        Available: <span th:text="${event.availableSeats}"></span>
                    </p>

                    <p class="fw-bold text-dark">
                        ₹<span th:text="${event.price}"></span>
                    </p>

                    <!-- ✅ Booking Form -->
                    <form action="/book" method="post" class="mt-auto">

                        <input type="hidden" name="eventId" th:value="${event.id}" />
                        <input type="hidden" name="userId" value="1"/>

                        <div class="mb-2">
                            <input type="number" 
                                   name="tickets" 
                                   class="form-control"
                                   placeholder="Enter tickets"
                                   required
                                   min="1"
                                   th:attr="max=${event.availableSeats}"
                                   onchange="validateTickets(this, this.max)">
                        </div>

                        <button type="submit" class="btn btn-success w-100 rounded-pill">
                            <i class="bi bi-ticket-perforated"></i> Book Now
                        </button>
                    </form>

                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
