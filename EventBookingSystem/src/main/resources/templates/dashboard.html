<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- 🔹 NAVBAR -->
<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">Dashboard</span>
        <a href="/events" class="btn btn-outline-light">Back to Events</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4 fw-bold">Analytics Dashboard</h2>

    <div class="row g-4">

        <!-- 🔹 Booking Count -->
        <div class="col-md-6">
            <div class="card shadow border-0 rounded-4">
                <div class="card-header bg-primary text-white fw-bold">
                    <i class="bi bi-bar-chart"></i> Booking Count per Event
                </div>
                <div class="card-body">

                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Event</th>
                                <th>Bookings</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="d : ${bookingCount}">
                                <td th:text="${d[0]}"></td>
                                <td th:text="${d[1]}"></td>
                            </tr>
                        </tbody>
                    </table>

                </div>
            </div>
        </div>

        <!-- 🔹 Revenue -->
        <div class="col-md-6">
            <div class="card shadow border-0 rounded-4">
                <div class="card-header bg-success text-white fw-bold">
                    <i class="bi bi-currency-rupee"></i> Revenue per Event
                </div>
                <div class="card-body">

                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Event</th>
                                <th>Revenue</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${revenue}">
                                <td th:text="${r[0]}"></td>
                                <td th:text="${r[1]}"></td>
                            </tr>
                        </tbody>
                    </table>

                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
