<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f4f6f9;
    }
    .card {
        border-radius: 12px;
    }
</style>

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

```
<div class="card shadow p-4" style="width: 400px;">
    
    <h4 class="text-center mb-3">Login to Your Account</h4>

    <!-- Messages -->
    <p class="text-danger text-center" th:if="${error}" th:text="${error}"></p>
    <p class="text-success text-center" th:if="${message}" th:text="${message}"></p>

    <!-- 🔹 PASSWORD LOGIN -->
    <form action="/login" method="post">

        <label>Email</label>
        <input type="email" name="email" class="form-control mb-2" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" name="password" class="form-control mb-2" placeholder="Enter your password" required>

        <button type="submit" class="btn btn-primary w-100 mb-2">
            Login with Password
        </button>

    </form>

  

    <!-- 🔹 Divider -->
    <div class="text-center mb-3">
        <span class="text-muted">OR</span>
    </div>

    <!-- 🔹 OTP LOGIN STEP 1 -->
    <form action="/send-email-otp" method="post">

        <label>Email for OTP</label>
        <input type="email" name="email" class="form-control mb-2"
               placeholder="Enter your email" required>

        <button type="submit" class="btn btn-warning w-100 mb-2">
            Send OTP
        </button>

    </form>

    <!-- 🔹 OTP LOGIN STEP 2 -->
    <form action="/verify-email-otp" method="post">

        <label>Enter OTP</label>
        <input type="text" name="otp" class="form-control mb-2"
               placeholder="Enter OTP received" required>

        <input type="hidden" name="email" th:value="${email}">

        <button type="submit" class="btn btn-success w-100">
            Verify OTP & Login
        </button>

    </form>

    <!-- 🔹 Register -->
    <div class="text-center mt-3">
        <small>New user?</small>
        <a href="/register">Create Account</a>
    </div>

</div>
```

</div>

</body>
</html>
