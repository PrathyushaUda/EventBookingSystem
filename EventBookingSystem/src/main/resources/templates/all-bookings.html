<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Bookings</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- 🔹 NAVBAR -->
<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">All Bookings</span>

        <div>
            <a href="/dashboard" class="btn btn-outline-light me-2">Dashboard</a>
            <a href="/events" class="btn btn-outline-light me-2">Events</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4 fw-bold">All Bookings List</h2>

    <!-- 🔹 BOOKINGS TABLE -->
    <div class="card shadow border-0 rounded-4">
        <div class="card-body">

            <table class="table table-hover text-center align-middle">

                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>User</th>
                        <th>Email</th>
                        <th>Event</th>
                        <th>Tickets</th>
                        <th>Total Amount</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="b, i : ${bookings}">
                        <td th:text="${i.count}"></td>
                        <td th:text="${b.user.name}"></td>
                        <td th:text="${b.user.email}"></td>
                        <td th:text="${b.event.title}"></td>
                        <td th:text="${b.numberOfTickets}"></td>
                        <td>
                            ₹ <span th:text="${b.totalAmount}"></span>
                        </td>
                        <td th:text="${b.bookingDate}"></td>
                        <td>
                            <span class="badge bg-success"
                                  th:text="${b.status}"></span>
                        </td>
                    </tr>
                </tbody>

            </table>

            <!-- 🔴 EMPTY MESSAGE -->
            <div class="text-center mt-3 text-muted"
                 th:if="${#lists.isEmpty(bookings)}">
                No bookings available
            </div>

        </div>
    </div>

</div>

</body>
</html>
